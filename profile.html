<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      padding-bottom: 80px;
    }
   .header {
      padding: 16px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
   .header h1 { font-size: 18px; }
   .settings-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
    }
   .profile-container { padding: 20px; }

    /* PROFILE TOP */
   .profile-top {
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 20px;
    }
   .avatar-box {
      width: 100px;
      height: 100px;
      border: 2px solid #333;
      border-radius: 8px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
   .avatar-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
   .avatar-box input { display: none; }
   .avatar-box span { font-size: 12px; color: #666; }

   .stats {
      flex: 1;
      display: flex;
      justify-content: space-around;
      text-align: center;
    }
   .stat h3 { font-size: 18px; }
   .stat p { font-size: 12px; color: #888; }

    /* PROFILE INFO */
   .profile-info { margin-bottom: 20px; }
   .profile-info h2 { font-size: 16px; margin-bottom: 4px; }
   .profile-info p { color: #aaa; font-size: 14px; margin-bottom: 8px; }

   .social-links {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
   .social-links a {
      background: #111;
      padding: 8px 16px;
      border-radius: 20px;
      color: #0095f6;
      text-decoration: none;
      font-size: 13px;
    }

   .edit-btn {
      width: 100%;
      padding: 8px;
      background: #111;
      border: 1px solid #333;
      color: #fff;
      border-radius: 8px;
      margin-top: 16px;
      cursor: pointer;
    }

    /* SETTINGS MODAL */
   .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
    }
   .modal-content {
      background: #111;
      margin: 60px 20px;
      padding: 20px;
      border-radius: 12px;
      max-height: 80vh;
      overflow-y: auto;
    }
   .modal h2 { margin-bottom: 20px; }
   .close { float: right; font-size: 28px; cursor: pointer; }

   .setting-item {
      padding: 16px 0;
      border-bottom: 1px solid #222;
    }
   .setting-item label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
    }
   .setting-item input,.setting-item select,.setting-item textarea {
      width: 100%;
      padding: 10px;
      background: #000;
      border: 1px solid #333;
      color: #fff;
      border-radius: 6px;
      font-size: 14px;
    }
   .setting-btn {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      background: #0095f6;
      border: none;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
   .danger-btn { background: #ed4956; }

    /* BOTTOM NAV */
   .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #000;
      border-top: 1px solid #222;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
    }
   .nav-item {
      text-align: center;
      font-size: 11px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1 id="username">@guest</h1>
    <button class="settings-btn" onclick="openSettings()">⚙️</button>
  </div>

  <div class="profile-container">
    <div class="profile-top">
      <label class="avatar-box" for="avatarUpload">
        <img id="avatarImg" src="" alt="">
        <span id="avatarText">+ Thlalak</span>
        <input type="file" id="avatarUpload" accept="image/*" onchange="uploadAvatar(event)">
      </label>

      <div class="stats">
        <div class="stat">
          <h3 id="postsCount">0</h3>
          <p>Posts</p>
        </div>
        <div class="stat">
          <h3 id="followersCount">0</h3>
          <p>Followers</p>
        </div>
        <div class="stat">
          <h3 id="followingCount">0</h3>
          <p>Following</p>
        </div>
      </div>
    </div>

    <div class="profile-info">
      <h2 id="displayName">Guest User</h2>
      <p id="userBio">Bio la awm lo</p>
      <div class="social-links" id="socialLinks"></div>
      <button class="edit-btn" onclick="openSettings()">Edit Profile</button>
    </div>
  </div>

  <!-- SETTINGS MODAL -->
  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeSettings()">&times;</span>
      <h2>Profile Settings</h2>

      <div class="setting-item">
        <label>Hming</label>
        <input type="text" id="editName" placeholder="I hming">
      </div>

      <div class="setting-item">
        <label>Bio</label>
        <textarea id="editBio" rows="3" placeholder="I chanchin tawi"></textarea>
      </div>

      <div class="setting-item">
        <label>Date of Birth</label>
        <input type="date" id="editDob">
      </div>

      <div class="setting-item">
        <label>Gender</label>
        <select id="editGender">
          <option value="">Thlang rawh</option>
          <option value="male">Mipa</option>
          <option value="female">Hmeichhia</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="setting-item">
        <label>Facebook Link</label>
        <input type="url" id="editFb" placeholder="https://facebook.com/...">
      </div>

      <div class="setting-item">
        <label>Instagram Link</label>
        <input type="url" id="editInsta" placeholder="https://instagram.com/...">
      </div>

      <button class="setting-btn" onclick="saveProfile()">Save Changes</button>

      <div class="setting-item">
        <button class="setting-btn" onclick="clearCache()">🗑️ Clear Cache</button>
      </div>

      <div class="setting-item">
        <button class="setting-btn danger-btn" onclick="logout()">🚪 Log Out</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='index.html'">🏠<br>Home</div>
    <div class="nav-item" onclick="alert('Live la siam loh')">🔴<br>Live</div>
    <div class="nav-item" onclick="alert('Battle la siam loh')">➕<br>Battle</div>
    <div class="nav-item" onclick="alert('Chat la siam loh')">💬<br>Chat</div>
    <div class="nav-item">👤<br>Profile</div>
  </div>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC...",
      authDomain: "live-battle-social.firebaseapp.com",
      projectId: "live-battle-social",
      storageBucket: "live-battle-social.appspot.com",
      messagingSenderId: "792106703995",
      appId: "1:792106703995:web:191735b9e33b47f2dd96de"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();
    let currentUser = null;

    // CHECK LOGIN
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        loadProfile(user.uid);
      } else {
        window.location.href = 'index.html';
      }
    });

    // LOAD PROFILE
    async function loadProfile(uid) {
      const doc = await db.collection('users').doc(uid).get();
      const data = doc.exists? doc.data() : {};

      document.getElementById('username').textContent = '@' + (data.username || currentUser.displayName || 'user');
      document.getElementById('displayName').textContent = data.name || currentUser.displayName || 'Guest User';
      document.getElementById('userBio').textContent = data.bio || 'Bio la awm lo';
      document.getElementById('followersCount').textContent = data.followers || 0;
      document.getElementById('followingCount').textContent = data.following || 0;
      document.getElementById('postsCount').textContent = data.posts || 0;

      if (data.avatarUrl) {
        document.getElementById('avatarImg').src = data.avatarUrl;
        document.getElementById('avatarText').style.display = 'none';
      }

      // Social Links
      let linksHtml = '';
      if (data.facebook) linksHtml += `<a href="${data.facebook}" target="_blank">Facebook</a>`;
      if (data.instagram) linksHtml += `<a href="${data.instagram}" target="_blank">Instagram</a>`;
      document.getElementById('socialLinks').innerHTML = linksHtml;

      // Fill settings form
      document.getElementById('editName').value = data.name || '';
      document.getElementById('editBio').value = data.bio || '';
      document.getElementById('editDob').value = data.dob || '';
      document.getElementById('editGender').value = data.gender || '';
      document.getElementById('editFb').value = data.facebook || '';
      document.getElementById('editInsta').value = data.instagram || '';
    }

    // UPLOAD AVATAR
    async function uploadAvatar(event) {
      const file = event.target.files[0];
      if (!file) return;

      const ref = storage.ref(`avatars/${currentUser.uid}`);
      await ref.put(file);
      const url = await ref.getDownloadURL();

      await db.collection('users').doc(currentUser.uid).set({ avatarUrl: url }, { merge: true });
      document.getElementById('avatarImg').src = url;
      document.getElementById('avatarText').style.display = 'none';
      alert('Thlalak upload complete!');
    }

    // SETTINGS
    function openSettings() {
      document.getElementById('settingsModal').style.display = 'block';
    }
    function closeSettings() {
      document.getElementById('settingsModal').style.display = 'none';
    }

    // SAVE PROFILE
    async function saveProfile() {
      const data = {
        name: document.getElementById('editName').value,
        bio: document.getElementById('editBio').value,
        dob: document.getElementById('editDob').value,
        gender: document.getElementById('editGender').value,
        facebook: document.getElementById('editFb').value,
        instagram: document.getElementById('editInsta').value,
        username: currentUser.displayName || 'user'
      };

      await db.collection('users').doc(currentUser.uid).set(data, { merge: true });
      alert('Profile save complete!');
      closeSettings();
      loadProfile(currentUser.uid);
    }

    // CLEAR CACHE
    function clearCache() {
      localStorage.clear();
      sessionStorage.clear();
      if ('caches' in window) {
        caches.keys().then(names => names.forEach(name => caches.delete(name)));
      }
      alert('Cache clear complete! Page refresh ang.');
      location.reload();
    }

    // LOGOUT
    function logout() {
      auth.signOut().then(() => {
        window.location.href = 'index.html';
      });
    }
  </script>
</body>
</html>
