<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Live Battle</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<!-- Manifest dik tak -->
<link rel="manifest" href="manifest.json">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#111827;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:1200px;background:#1f2937;border-radius:20px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
h1{text-align:center;color:#f47155;font-size:2.5rem;margin-bottom:20px}
.view{display:none}.view.active{display:block}
input,button{width:100%;padding:14px;border-radius:10px;border:none;font-size:1rem;margin:8px 0}
input{background:#374151;color:#fff;border:2px solid #4b5563}
button{background:#f47155;color:#fff;font-weight:bold;cursor:pointer}
button:hover{background:#e55a3d}
button.secondary{background:#374151}
.video-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0}
.video-box{background:#000;border-radius:12px;overflow:hidden;aspect-ratio:16/9;position:relative}
.video-box video{width:100%;height:100%;object-fit:cover}
.label{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,0.7);padding:6px 12px;border-radius:6px;font-weight:bold}
.gift-bar{display:flex;gap:8px;margin:20px 0;flex-wrap:wrap}
.gift-btn{flex:1;min-width:80px;background:#374151;padding:12px;border-radius:10px;cursor:pointer;text-align:center}
.gift-btn:hover{background:#4b5563}
.scores{display:flex;justify-content:space-around;text-align:center;margin:20px 0}
.score-box h3{color:#f47155;font-size:2rem}
.share-box{background:#374151;padding:16px;border-radius:10px;margin:16px 0;text-align:center}
#shareLink{word-break:break-all;color:#f47155;font-weight:bold}
.host-controls{display:flex;gap:10px;margin-top:16px}
@media(max-width:768px){.video-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
    <h1>🔥 LIVE BATTLE</h1>

    <!-- Login View -->
    <div id="loginView" class="view active">
        <input type="text" id="usernameInput" placeholder="I hming dah rawh">
        <button id="guestBtn">Guest angin lut mai</button>
    </div>

    <!-- Lobby View -->
    <div id="lobbyView" class="view">
        <h2 style="text-align:center;margin-bottom:20px">Welcome, <span id="displayName"></span>!</h2>
        <button id="createRoomBtn">HOST - Battle siam rawh</button>
        <input type="text" id="joinCodeInput" placeholder="Room Code dah la" style="margin-top:16px">
        <button id="joinRoomBtn" class="secondary">Join Battle</button>
    </div>

    <!-- Host View -->
    <div id="hostView" class="view">
        <div class="share-box">
            <p>Room Code: <b id="roomCodeText"></b></p>
            <p style="font-size:0.9rem;margin-top:8px">He link hi i thiante share rawh:</p>
            <p id="shareLink"></p>
            <button id="copyLinkBtn" style="margin-top:10px">Link Copy</button>
        </div>
        <div class="video-grid">
            <div class="video-box">
                <video id="hostVideo" autoplay playsinline muted></video>
                <div class="label">HOST: <span id="hostName"></span></div>
            </div>
            <div class="video-box">
                <video id="guestVideo" autoplay playsinline></video>
                <div class="label">GUEST: <span id="guestName">Waiting...</span></div>
            </div>
        </div>
        <div class="scores">
            <div class="score-box"><h3 id="hostScore">0</h3><p>HOST</p></div>
            <div class="score-box"><h3 id="guestScore">0</h3><p>GUEST</p></div>
        </div>
        <div class="host-controls">
            <button id="endBattleBtn" class="secondary">Battle Tihtawp</button>
        </div>
    </div>

    <!-- Guest View -->
    <div id="guestView" class="view">
        <div class="video-grid">
            <div class="video-box">
                <video id="guestHostVideo" autoplay playsinline></video>
                <div class="label">HOST: <span id="guestHostName"></span></div>
            </div>
            <div class="video-box">
                <video id="guestSelfVideo" autoplay playsinline muted></video>
                <div class="label">NANGMAH: <span id="guestSelfName"></span></div>
            </div>
        </div>
        <div class="scores">
            <div class="score-box"><h3 id="guestHostScore">0</h3><p>HOST</p></div>
            <div class="score-box"><h3 id="guestSelfScore">0</h3><p>NANGMAH</p></div>
        </div>
        <div class="gift-bar">
            <div class="gift-btn" data-value="1">🌹<br>Rose<br>1</div>
            <div class="gift-btn" data-value="10">🍭<br>Lollipop<br>10</div>
            <div class="gift-btn" data-value="50">🚀<br>Rocket<br>50</div>
            <div class="gift-btn" data-value="100">💎<br>Diamond<br>100</div>
        </div>
    </div>
</div>

<script>
const PEER_CONFIG = { host: '0.peerjs.com', port: 443, secure: true };
let peer, currentUser, currentRoomId, isHost = false;
let localStream, hostConnection, guestConnection;
let scores = { host: 0, guest: 0 };

const views = {
    login: document.getElementById('loginView'),
    lobby: document.getElementById('lobbyView'),
    host: document.getElementById('hostView'),
    guest: document.getElementById('guestView')
};

function showView(name) {
    Object.values(views).forEach(v => v.classList.remove('active'));
    views[name].classList.add('active');
}

function init() {
    document.getElementById('guestBtn').onclick = guestLogin;
    document.getElementById('createRoomBtn').onclick = createRoom;
    document.getElementById('joinRoomBtn').onclick = () => joinRoom(document.getElementById('joinCodeInput').value);
    document.getElementById('copyLinkBtn').onclick = copyLink;
    document.getElementById('endBattleBtn').onclick = () => location.reload();
    document.querySelectorAll('.gift-btn').forEach(btn => {
        btn.onclick = () => sendGift(parseInt(btn.dataset.value));
    });
    checkUrlForRoom();
}

function guestLogin() {
    const name = document.getElementById('usernameInput').value.trim() || `Guest${Math.floor(Math.random()*1000)}`;
    currentUser = { name };
    document.getElementById('displayName').textContent = name;
    showView('lobby');
}

async function createRoom() {
    isHost = true;
    showView('host');
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('hostVideo').srcObject = localStream;
    } catch(err) {
        alert('Camera/Mic phalna pek a ngai: ' + err.message);
        showView('lobby');
        return;
    }

    peer = new Peer(PEER_CONFIG);
    peer.on('open', id => {
        currentRoomId = id;
        document.getElementById('roomCodeText').textContent = id;
        document.getElementById('hostName').textContent = currentUser.name;
        const link = `${window.location.origin}${window.location.pathname}?room=${id}`;
        document.getElementById('shareLink').textContent = link;
    });

    peer.on('call', call => {
        call.answer(localStream);
        call.on('stream', stream => {
            document.getElementById('guestVideo').srcObject = stream;
        });
    });

    peer.on('connection', conn => {
        hostConnection = conn;
        conn.on('data', data => {
            if(data.type === 'userInfo') {
                document.getElementById('guestName').textContent = data.name;
            }
            if(data.type === 'gift') {
                scores.guest += data.value;
                updateScores();
            }
        });
    });
}

function joinRoom(roomId) {
    if(!roomId) return alert('Room Code dah rawh');
    isHost = false;
    showView('guest');

    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
        localStream = stream;
        document.getElementById('guestSelfVideo').srcObject = stream;
        document.getElementById('guestSelfName').textContent = currentUser.name;

        peer = new Peer(PEER_CONFIG);
        peer.on('open', () => {
            const call = peer.call(roomId, stream);
            call.on('stream', remoteStream => {
                document.getElementById('guestHostVideo').srcObject = remoteStream;
            });

            guestConnection = peer.connect(roomId);
            guestConnection.on('open', () => {
                guestConnection.send({ type: 'userInfo', name: currentUser.name });
            });
        });
    }).catch(err => {
        alert('Camera/Mic phalna pek a ngai: ' + err.message);
        showView('lobby');
    });
}

function sendGift(value) {
    if(!guestConnection) return alert('Host nen in connect lo');
    scores.host += value;
    updateScores();
    guestConnection.send({ type: 'gift', value });
}

function updateScores() {
    if(isHost) {
        document.getElementById('hostScore').textContent = scores.host;
        document.getElementById('guestScore').textContent = scores.guest;
    } else {
        document.getElementById('guestHostScore').textContent = scores.host;
        document.getElementById('guestSelfScore').textContent = scores.guest;
    }
}

function copyLink() {
    navigator.clipboard.writeText(document.getElementById('shareLink').textContent);
    alert('Link copied!');
}

function checkUrlForRoom() {
    const params = new URLSearchParams(window.location.search);
    const room = params.get('room');
    if(room) {
        const name = prompt('I hming:') || `Guest${Math.floor(Math.random()*1000)}`;
        currentUser = { name };
        joinRoom(room);
    }
}

init();
</script>
</body>
</html>
